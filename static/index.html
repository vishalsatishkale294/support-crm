<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support CRM — Datastraw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind custom config — extend with our brand colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' }
          }
        }
      }
    }
  </script>
  <style>
    /* Smooth transitions for modals and cards */
    .modal-backdrop { backdrop-filter: blur(4px); }
    .ticket-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .ticket-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

<!-- ═══════════════════════════════════════════════════════════════════════════
     NAVIGATION BAR
═══════════════════════════════════════════════════════════════════════════ -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <div>
          <span class="font-bold text-slate-800 text-lg">Support CRM</span>
          <span class="hidden sm:inline text-slate-400 text-sm ml-2">by Datastraw</span>
        </div>
      </div>
      <!-- New Ticket Button -->
      <button onclick="openCreateModal()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium
               flex items-center gap-2 transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Ticket
      </button>
    </div>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════════════════════════════════════ -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <!-- STATS CARDS -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
      <div class="text-2xl font-bold text-slate-800" id="stat-total">—</div>
      <div class="text-slate-500 text-sm mt-1">Total Tickets</div>
    </div>
    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
      <div class="text-2xl font-bold text-blue-600" id="stat-open">—</div>
      <div class="text-slate-500 text-sm mt-1">Open</div>
    </div>
    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
      <div class="text-2xl font-bold text-amber-500" id="stat-progress">—</div>
      <div class="text-slate-500 text-sm mt-1">In Progress</div>
    </div>
    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
      <div class="text-2xl font-bold text-emerald-500" id="stat-closed">—</div>
      <div class="text-slate-500 text-sm mt-1">Closed</div>
    </div>
  </div>

  <!-- SEARCH & FILTER BAR -->
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-6">
    <div class="flex flex-col sm:flex-row gap-3">
      <!-- Search input — triggers as you type (debounced) -->
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search tickets, customers, emails..."
          class="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          oninput="debounceSearch()" />
      </div>
      <!-- Status filter -->
      <select id="status-filter" onchange="loadTickets()"
        class="border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-600
               focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white min-w-[140px]">
        <option value="">All Statuses</option>
        <option value="Open">🔵 Open</option>
        <option value="In Progress">🟡 In Progress</option>
        <option value="Closed">🟢 Closed</option>
      </select>
      <!-- Priority filter -->
      <select id="priority-filter" onchange="loadTickets()"
        class="border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-600
               focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white min-w-[140px]">
        <option value="">All Priorities</option>
        <option value="High">🔴 High</option>
        <option value="Medium">🟡 Medium</option>
        <option value="Low">🟢 Low</option>
      </select>
      <!-- Clear button -->
      <button onclick="clearFilters()"
        class="px-4 py-2.5 text-sm text-slate-500 hover:text-slate-700 border border-slate-200
               rounded-lg hover:bg-slate-50 transition-colors whitespace-nowrap">
        Clear
      </button>
    </div>
  </div>

  <!-- TICKET COUNT -->
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-slate-700 font-semibold text-sm" id="ticket-count-label">Loading tickets...</h2>
  </div>

  <!-- TICKETS LIST -->
  <div id="tickets-container" class="space-y-3">
    <!-- Filled by JS -->
    <div class="text-center py-16 text-slate-400">
      <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Loading tickets...</p>
    </div>
  </div>
</main>


<!-- ═══════════════════════════════════════════════════════════════════════════
     MODAL: CREATE TICKET
═══════════════════════════════════════════════════════════════════════════ -->
<div id="create-modal" class="fixed inset-0 z-50 hidden modal-backdrop bg-slate-900/50">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg fade-in">
      <!-- Header -->
      <div class="flex items-center justify-between p-6 border-b border-slate-100">
        <div>
          <h2 class="text-lg font-bold text-slate-800">Create New Ticket</h2>
          <p class="text-slate-500 text-sm mt-0.5">Fill in the customer's issue details</p>
        </div>
        <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- Body -->
      <div class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Customer Name *</label>
            <input id="f-name" type="text" placeholder="John Doe"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email *</label>
            <input id="f-email" type="email" placeholder="john@example.com"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Subject *</label>
            <input id="f-subject" type="text" placeholder="Brief issue title"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Priority</label>
            <select id="f-priority"
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="Low">🟢 Low</option>
              <option value="Medium" selected>🟡 Medium</option>
              <option value="High">🔴 High</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Description *</label>
          <textarea id="f-description" rows="4" placeholder="Describe the issue in detail..."
            class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>
        <!-- Error message -->
        <div id="create-error" class="hidden text-red-600 text-sm bg-red-50 rounded-lg px-3 py-2"></div>
      </div>
      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 px-6 pb-6">
        <button onclick="closeCreateModal()"
          class="px-4 py-2.5 text-sm text-slate-600 hover:text-slate-800 transition-colors">
          Cancel
        </button>
        <button onclick="createTicket()" id="create-btn"
          class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm
                 font-medium transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Create Ticket
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════════════
     MODAL: TICKET DETAIL
═══════════════════════════════════════════════════════════════════════════ -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden modal-backdrop bg-slate-900/50">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col fade-in">
      <!-- Header -->
      <div class="flex items-center justify-between p-6 border-b border-slate-100 flex-shrink-0">
        <div>
          <div class="flex items-center gap-2">
            <span id="d-ticket-id" class="font-mono text-sm font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded"></span>
            <span id="d-status-badge"></span>
            <span id="d-priority-badge"></span>
          </div>
          <h2 id="d-subject" class="text-lg font-bold text-slate-800 mt-1"></h2>
        </div>
        <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Scrollable body -->
      <div class="overflow-y-auto flex-1 p-6 space-y-6">
        <!-- Customer info -->
        <div class="bg-slate-50 rounded-xl p-4">
          <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Customer</h3>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <div class="text-xs text-slate-500 mb-0.5">Name</div>
              <div id="d-name" class="text-sm font-medium text-slate-800"></div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-0.5">Email</div>
              <div id="d-email" class="text-sm font-medium text-slate-800"></div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-0.5">Created</div>
              <div id="d-created" class="text-sm text-slate-600"></div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-0.5">Last Updated</div>
              <div id="d-updated" class="text-sm text-slate-600"></div>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div>
          <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Description</h3>
          <p id="d-description" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap
             bg-slate-50 rounded-xl p-4"></p>
        </div>

        <!-- Notes timeline -->
        <div>
          <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">
            Notes & Updates
          </h3>
          <div id="d-notes" class="space-y-3">
            <!-- Filled by JS -->
          </div>
        </div>

        <!-- Update section -->
        <div class="border-t border-slate-100 pt-5">
          <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Add Update</h3>
          <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs text-slate-600 mb-1">Update Status</label>
                <select id="d-status-select"
                  class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm
                         focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                  <option value="">Keep current status</option>
                  <option value="Open">Open</option>
                  <option value="In Progress">In Progress</option>
                  <option value="Closed">Closed</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">Your Name</label>
                <input id="d-author" type="text" value="Support Agent" placeholder="Your name"
                  class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm
                         focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
            </div>
            <textarea id="d-note-input" rows="3" placeholder="Add a note or comment..."
              class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            <button onclick="updateTicket()" id="update-btn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm
                     font-medium transition-colors">
              Save Update
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
  <div class="bg-slate-800 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2">
    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span id="toast-msg"></span>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════════════
     JAVASCRIPT — All the app logic
═══════════════════════════════════════════════════════════════════════════ -->
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// API_BASE is empty → calls go to the same server (relative URLs).
// If you deploy frontend separately, set this to your backend URL.
const API_BASE = '';

// Track which ticket is open in the detail modal
let currentTicketId = null;
let searchTimeout = null;

// ── UTILS ────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}

function formatDate(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function statusBadge(status) {
  const map = {
    'Open':        'bg-blue-100 text-blue-700',
    'In Progress': 'bg-amber-100 text-amber-700',
    'Closed':      'bg-emerald-100 text-emerald-700'
  };
  const cls = map[status] || 'bg-slate-100 text-slate-600';
  return `<span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium ${cls}">${status}</span>`;
}

function priorityBadge(priority) {
  const map = {
    'High':   'bg-red-100 text-red-700',
    'Medium': 'bg-amber-100 text-amber-700',
    'Low':    'bg-emerald-100 text-emerald-700'
  };
  const cls = map[priority] || 'bg-slate-100 text-slate-600';
  const icon = priority === 'High' ? '🔴' : priority === 'Medium' ? '🟡' : '🟢';
  return `<span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium ${cls}">${icon} ${priority}</span>`;
}

// ── STATS ────────────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/api/stats`);
    const data = await res.json();
    document.getElementById('stat-total').textContent    = data.total ?? 0;
    document.getElementById('stat-open').textContent     = data.open ?? 0;
    document.getElementById('stat-progress').textContent = data.in_progress ?? 0;
    document.getElementById('stat-closed').textContent   = data.closed ?? 0;
  } catch(e) { console.error('Stats load failed', e); }
}

// ── SEARCH (debounced) ────────────────────────────────────────────────────────
// Debounce = wait 300ms after user stops typing before making API call.
// Prevents hammering the server on every keystroke.

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(loadTickets, 300);
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('status-filter').value = '';
  document.getElementById('priority-filter').value = '';
  loadTickets();
}

// ── LOAD TICKETS ──────────────────────────────────────────────────────────────

async function loadTickets() {
  const search   = document.getElementById('search-input').value.trim();
  const status   = document.getElementById('status-filter').value;
  const priority = document.getElementById('priority-filter').value;

  // Build URL with query params
  const params = new URLSearchParams();
  if (search)   params.set('search', search);
  if (status)   params.set('status', status);
  if (priority) params.set('priority', priority);

  const container = document.getElementById('tickets-container');
  container.innerHTML = `
    <div class="text-center py-16 text-slate-400">
      <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-sm">Loading tickets...</p>
    </div>`;

  try {
    const res  = await fetch(`${API_BASE}/api/tickets?${params}`);
    const data = await res.json();
    renderTickets(data.tickets || [], data.count || 0);
  } catch(e) {
    container.innerHTML = `
      <div class="text-center py-16 text-red-400">
        <p class="font-medium">Failed to load tickets</p>
        <p class="text-sm mt-1 text-slate-400">Make sure the server is running</p>
      </div>`;
  }
}

// ── RENDER TICKETS ────────────────────────────────────────────────────────────

function renderTickets(tickets, count) {
  const container = document.getElementById('tickets-container');
  const label     = document.getElementById('ticket-count-label');

  label.textContent = `${count} ticket${count !== 1 ? 's' : ''} found`;

  if (tickets.length === 0) {
    container.innerHTML = `
      <div class="text-center py-20 text-slate-400 fade-in">
        <svg class="w-14 h-14 mx-auto mb-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p class="font-medium text-slate-500">No tickets found</p>
        <p class="text-sm mt-1">Try adjusting your search or filters</p>
      </div>`;
    return;
  }

  container.innerHTML = tickets.map(t => `
    <div class="ticket-card bg-white rounded-xl border border-slate-200 shadow-sm p-5 cursor-pointer fade-in"
         onclick="openTicket('${t.ticket_id}')">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="font-mono text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">
              ${t.ticket_id}
            </span>
            ${statusBadge(t.status)}
            ${priorityBadge(t.priority)}
          </div>
          <h3 class="font-semibold text-slate-800 text-sm truncate">${escHtml(t.subject)}</h3>
          <div class="flex items-center gap-3 mt-2 text-xs text-slate-500">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              ${escHtml(t.customer_name)}
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              ${escHtml(t.customer_email)}
            </span>
          </div>
        </div>
        <div class="text-right text-xs text-slate-400 whitespace-nowrap flex-shrink-0">
          <div>${formatDate(t.created_at)}</div>
          <div class="mt-1 text-slate-300">Click to view →</div>
        </div>
      </div>
    </div>
  `).join('');
}

// Prevent XSS — always escape user-generated content before inserting into HTML
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CREATE MODAL ──────────────────────────────────────────────────────────────

function openCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  document.getElementById('f-name').focus();
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  // Clear form
  ['f-name','f-email','f-subject','f-description'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-priority').value = 'Medium';
  document.getElementById('create-error').classList.add('hidden');
}

async function createTicket() {
  const name   = document.getElementById('f-name').value.trim();
  const email  = document.getElementById('f-email').value.trim();
  const subject= document.getElementById('f-subject').value.trim();
  const desc   = document.getElementById('f-description').value.trim();
  const priority = document.getElementById('f-priority').value;

  const errEl = document.getElementById('create-error');

  // Basic validation
  if (!name || !email || !subject || !desc) {
    errEl.textContent = 'Please fill in all required fields.';
    errEl.classList.remove('hidden');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');

  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  try {
    const res = await fetch(`${API_BASE}/api/tickets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customer_name: name, customer_email: email,
                             subject, description: desc, priority })
    });
    const data = await res.json();
    if (res.ok) {
      closeCreateModal();
      showToast(`✅ ${data.ticket_id} created successfully!`);
      loadTickets();
      loadStats();
    } else {
      errEl.textContent = data.detail || 'Failed to create ticket.';
      errEl.classList.remove('hidden');
    }
  } catch(e) {
    errEl.textContent = 'Network error. Is the server running?';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Create Ticket`;
  }
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────────────

async function openTicket(ticketId) {
  currentTicketId = ticketId;
  document.getElementById('detail-modal').classList.remove('hidden');

  // Clear previous content
  document.getElementById('d-notes').innerHTML = `
    <div class="text-center py-4 text-slate-400 text-sm">Loading...</div>`;

  try {
    const res    = await fetch(`${API_BASE}/api/tickets/${ticketId}`);
    const ticket = await res.json();
    if (!res.ok) throw new Error(ticket.detail);

    // Populate fields
    document.getElementById('d-ticket-id').textContent = ticket.ticket_id;
    document.getElementById('d-subject').textContent   = ticket.subject;
    document.getElementById('d-name').textContent      = ticket.customer_name;
    document.getElementById('d-email').textContent     = ticket.customer_email;
    document.getElementById('d-description').textContent = ticket.description;
    document.getElementById('d-created').textContent   = formatDate(ticket.created_at);
    document.getElementById('d-updated').textContent   = formatDate(ticket.updated_at);
    document.getElementById('d-status-badge').innerHTML = statusBadge(ticket.status);
    document.getElementById('d-priority-badge').innerHTML = priorityBadge(ticket.priority);

    // Pre-select current status in dropdown
    document.getElementById('d-status-select').value = '';

    // Render notes
    renderNotes(ticket.notes || []);
  } catch(e) {
    document.getElementById('d-notes').innerHTML = `
      <p class="text-red-500 text-sm">Failed to load ticket: ${e.message}</p>`;
  }
}

function renderNotes(notes) {
  const container = document.getElementById('d-notes');
  if (notes.length === 0) {
    container.innerHTML = `
      <p class="text-slate-400 text-sm italic text-center py-4">
        No notes yet. Add one below!
      </p>`;
    return;
  }
  container.innerHTML = notes.map(n => `
    <div class="bg-slate-50 rounded-xl p-4 border border-slate-100">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-slate-600">${escHtml(n.author)}</span>
        <span class="text-xs text-slate-400">${formatDate(n.created_at)}</span>
      </div>
      <p class="text-sm text-slate-700 whitespace-pre-wrap">${escHtml(n.note_text)}</p>
    </div>
  `).join('');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.add('hidden');
  document.getElementById('d-note-input').value = '';
  document.getElementById('d-status-select').value = '';
  currentTicketId = null;
}

async function updateTicket() {
  const status   = document.getElementById('d-status-select').value;
  const note     = document.getElementById('d-note-input').value.trim();
  const author   = document.getElementById('d-author').value.trim() || 'Support Agent';

  if (!status && !note) {
    showToast('⚠️ Please update the status or add a note.');
    return;
  }

  const btn = document.getElementById('update-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const res = await fetch(`${API_BASE}/api/tickets/${currentTicketId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: status || undefined,
                             note_text: note || undefined, author })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('✅ Ticket updated!');
      openTicket(currentTicketId); // Reload the detail view
      loadTickets();               // Refresh the list
      loadStats();                 // Refresh the stats
    } else {
      showToast(`❌ Error: ${data.detail}`);
    }
  } catch(e) {
    showToast('❌ Network error.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Update';
  }
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeDetailModal();
    closeCreateModal();
  }
  // Press 'N' to open new ticket (when not typing)
  if (e.key === 'n' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
    openCreateModal();
  }
});

// Close modal when clicking backdrop
document.getElementById('create-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCreateModal();
});
document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDetailModal();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
// Run when page first loads
loadStats();
loadTickets();
</script>
</body>
</html>
